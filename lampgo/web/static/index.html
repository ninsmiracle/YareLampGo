<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lampgo 控制台</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="left-rail">
      <div class="brand-card">
        <div class="brand-mark">
          <img src="/%E5%8F%B0%E7%81%AF%E8%99%BE%E5%A4%B4%E5%83%8F.jpeg" alt="lampgo 头像" class="brand-avatar">
        </div>
        <div>
          <div class="brand-title">lampgo</div>
          <div class="brand-subtitle">Robot console</div>
        </div>
      </div>

      <div class="nav-card">
        <button class="nav-item nav-item-active" type="button">聊天</button>
        <button class="nav-item" id="btn-open-events" type="button">活动流</button>
      </div>

      <section class="panel-card">
        <div class="panel-title">设备状态</div>
        <div id="status-panel" class="status-list">
          <div>健康 <span id="st-health" class="status-value status-neutral">--</span></div>
          <div>忙碌 <span id="st-busy" class="status-value status-neutral">--</span></div>
          <div>当前技能 <span id="st-skill" class="status-value status-neutral">--</span></div>
          <div>急停 <span id="st-estop" class="status-value status-neutral">--</span></div>
        </div>
      </section>

      <section class="panel-card">
        <div class="panel-title">关节角度</div>
        <div id="joint-panel" class="joint-panel"></div>
      </section>

      <section class="panel-card">
        <div class="panel-title">OpenClaw 任务</div>
        <div id="openclaw-task-list" class="openclaw-task-list">
          <div class="openclaw-empty">暂无复杂任务</div>
        </div>
      </section>

      <section class="panel-card panel-grow">
        <div class="panel-title">动作面板</div>
        <div class="action-group" data-group="skills">
          <button class="group-header" type="button" data-toggle-group="skills" aria-expanded="true">
            <span class="group-title">内置技能</span>
            <span class="group-arrow">▾</span>
          </button>
          <div class="group-body" data-group-body="skills">
            <div id="skill-grid" class="skill-grid"></div>
          </div>
        </div>
        <div class="action-group" data-group="recordings">
          <button class="group-header" type="button" data-toggle-group="recordings" aria-expanded="true">
            <span class="group-title">录制动作</span>
            <span class="group-arrow">▾</span>
          </button>
          <div class="group-body" data-group-body="recordings">
            <div class="record-action-bar">
              <button id="btn-record-motion-panel" class="ghost-button" type="button">录制动作</button>
            </div>
            <div id="recording-grid" class="skill-grid"></div>
          </div>
        </div>
        <div class="action-group" data-group="expressions">
          <button class="group-header" type="button" data-toggle-group="expressions" aria-expanded="false">
            <span class="group-title">灯光表情</span>
            <span class="group-arrow">▾</span>
          </button>
          <div class="group-body group-collapsed" data-group-body="expressions">
            <div id="expression-grid" class="skill-grid"></div>
          </div>
        </div>
      </section>
    </aside>

    <div
      id="pane-resizer"
      class="pane-resizer"
      role="separator"
      aria-orientation="vertical"
      aria-label="调整侧栏宽度"
      title="拖动调整左侧区域宽度"
    ></div>

    <main class="workspace">
      <header class="workspace-header">
        <div>
          <div class="workspace-title">聊天</div>
          <div class="workspace-subtitle">发送自然语言指令，查看每一步执行状态</div>
        </div>

        <div class="workspace-actions">
          <div id="conn-badge" class="connection-chip">
            <span class="connection-dot is-offline" id="conn-dot"></span>
            <span id="conn-text">未连接</span>
          </div>
          <button id="btn-record-motion" class="ghost-button" type="button">录制动作</button>
          <button id="btn-estop" class="danger-button" type="button">E-STOP</button>
        </div>
      </header>

      <section class="chat-card">
        <div id="chat-messages" class="chat-messages">
          <div id="empty-state" class="empty-state">
            <div class="empty-state-title">开始一次对话</div>
            <div class="empty-state-body">例如输入“做个点头的动作”或“回到安全位置”。</div>
          </div>
        </div>

        <div class="composer-wrap">
          <form id="chat-form" class="composer">
            <div class="mic-group">
              <button id="btn-mic" class="mic-button" type="button" title="语音输入">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
              </button>
              <select id="mic-select" class="mic-select" title="选择麦克风">
                <option value="">默认麦克风</option>
              </select>
            </div>
            <input
              id="chat-input"
              type="text"
              placeholder="输入指令，例如：做个点头的动作"
              autocomplete="off"
              class="composer-input"
            >
            <div id="voice-wave" class="voice-wave hidden">
              <canvas id="voice-canvas" class="voice-canvas"></canvas>
              <span class="voice-hint">聆听中…</span>
            </div>
            <button id="btn-voice-cancel" class="voice-cancel-button hidden" type="button" title="取消录音">取消</button>
            <button id="btn-stop" class="stop-button hidden" type="button" title="停止当前任务">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
              停止
            </button>
            <button class="send-button" type="submit">发送</button>
          </form>
        </div>
      </section>
    </main>
  </div>

  <aside id="event-drawer" class="event-drawer hidden">
    <div class="event-drawer-header">
      <div>
        <div class="drawer-title">活动流</div>
        <div class="drawer-subtitle">实时事件与执行记录</div>
      </div>
      <button id="btn-close-drawer" class="drawer-close" type="button">&times;</button>
    </div>
    <div id="event-log" class="event-log"></div>
  </aside>

  <dialog id="record-name-dialog" class="record-dialog">
    <form id="record-name-form" method="dialog" class="record-dialog-card">
      <div class="record-dialog-title">保存录制动作</div>
      <div class="record-dialog-desc">请输入动作名称，或放弃并重新录制。</div>
      <input
        id="record-name-input"
        class="record-dialog-input"
        type="text"
        maxlength="64"
        placeholder="例如：my_wave_action"
        autocomplete="off"
      >
      <div id="record-name-error" class="record-dialog-error"></div>
      <div class="record-dialog-actions">
        <button id="btn-record-discard" class="ghost-button" type="button">放弃</button>
        <button id="btn-record-rerecord" class="ghost-button" type="button">重新录制</button>
        <button id="btn-record-save" class="send-button" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <dialog id="record-start-dialog" class="record-dialog">
    <form id="record-start-form" class="record-dialog-card">
      <div class="record-dialog-title">开始录制动作</div>
      <div id="record-start-desc" class="record-dialog-desc">点击“开始录制”后将自动关闭电机力矩，你可以手动掰动关节进行录制。</div>
      <div id="record-timer" class="record-dialog-timer">已录制 0.0s</div>
      <div id="record-metrics" class="record-dialog-metrics">采样：-- FPS · 0 帧</div>
      <div class="record-dialog-actions">
        <button id="btn-record-start-cancel" class="ghost-button" type="button">取消</button>
        <button id="btn-record-start-confirm" class="send-button" type="submit">开始录制</button>
      </div>
    </form>
  </dialog>

  <script src="/app.js"></script>
</body>
</html>
